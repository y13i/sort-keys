name: publish
on:
  release:
    types:
      - published
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: "false"
      - run: devbox run -- pnpm ci
      - run: devbox run -- pnpm run build
      - run: devbox run -- pnpm publish --no-git-checks --access=public
