name: publish
on:
  release:
    types:
      - published
permissions:
  id-token: write
  contents: read
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: "false"
      - run: devbox run -- pnpm install --frozen-lockfile
      - run: devbox run -- pnpm run build
      - run: devbox run -- pnpm publish --no-git-checks --access=public
