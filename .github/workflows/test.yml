name: test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jetify-com/devbox-install-action@v0.15.0
        with:
          enable-cache: "true"
      - run: devbox run -- pnpm install --frozen-lockfile
      - run: devbox run -- pnpm run build
      - run: devbox run -- pnpm test
      - run: devbox run -- pnpm run lint
